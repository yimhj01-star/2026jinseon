<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진선여고 고교학점제 모의 진단기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
<style>
  :root {
    --primary: #4F46E5;
    --primary-light: #EEF2FF;
    --primary-dark: #3730A3;
    --success: #059669;
    --success-light: #ECFDF5;
    --warning: #D97706;
    --warning-light: #FFFBEB;
    --danger: #DC2626;
    --danger-light: #FEF2F2;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-400: #9CA3AF;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --gray-900: #111827;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }

  /* ── HEADER ── */
  .header { background: white; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 50; }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .header-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
  .header-tabs { display: flex; gap: 4px; }
  .tab-btn { padding: 6px 16px; border-radius: 8px; border: none; background: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; color: var(--gray-500); transition: all .15s; display: flex; align-items: center; gap: 6px; }
  .tab-btn:hover { background: var(--gray-100); color: var(--gray-700); }
  .tab-btn.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .year-select { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--gray-200); font-size: 0.8rem; color: var(--gray-700); cursor: pointer; background: white; }

  /* ── MAIN LAYOUT ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }

  /* ── CREDIT SUMMARY BAR ── */
  .credit-bar { background: white; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .credit-bar-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .credit-stat { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
  .credit-stat .value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
  .credit-stat .label { font-size: 0.7rem; color: var(--gray-500); margin-top: 2px; }
  .credit-progress { flex: 1; min-width: 200px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--gray-500); margin-bottom: 6px; }
  .progress-track { background: var(--gray-100); border-radius: 99px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--primary), #818CF8); transition: width .4s; }
  .progress-fill.done { background: linear-gradient(90deg, var(--success), #34D399); }
  .divider-v { width: 1px; height: 40px; background: var(--gray-200); }

  /* ── GRADE / SEMESTER TABS ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .grade-tabs { display: flex; gap: 4px; }
  .grade-tab { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--gray-200); background: white; font-size: 0.8rem; cursor: pointer; color: var(--gray-500); transition: all .15s; }
  .grade-tab.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: 600; }
  .sem-tabs { display: flex; gap: 4px; }
  .sem-tab { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--gray-200); background: white; font-size: 0.8rem; cursor: pointer; color: var(--gray-500); transition: all .15s; }
  .sem-tab.active { background: var(--gray-700); color: white; border-color: var(--gray-700); }

  /* ── SUBJECT CARDS ── */
  .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .subject-card { background: white; border-radius: 10px; border: 1.5px solid var(--gray-200); padding: 14px; transition: all .15s; }
  .subject-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(79,70,229,.1); }
  .subject-card.fixed { border-color: var(--gray-200); background: var(--gray-50); }
  .subject-card.selected { border-color: var(--primary); background: var(--primary-light); }
  .subject-card.disabled { opacity: 0.45; pointer-events: none; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .subject-name { font-size: 0.9rem; font-weight: 600; color: var(--gray-800); line-height: 1.3; }
  .subject-name.fixed-name { color: var(--gray-600); }
  .card-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .badge { padding: 2px 7px; border-radius: 99px; font-size: 0.68rem; font-weight: 500; border: 1px solid; }
  .badge-category { }
  .badge-credits { background: var(--gray-100); color: var(--gray-600); border-color: var(--gray-200); }
  .badge-fixed { background: #F0FDF4; color: #166534; border-color: #BBF7D0; }
  .badge-specialty { background: #FEF9C3; color: #713F12; border-color: #FDE68A; }
  .card-bottom { display: flex; align-items: center; justify-content: space-between; }
  .check-btn { width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--gray-300); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
  .check-btn:hover { border-color: var(--primary); }
  .check-btn.checked { background: var(--primary); border-color: var(--primary); }
  .info-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--gray-200); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--gray-400); transition: all .15s; }
  .info-btn:hover { border-color: var(--primary); color: var(--primary); }
  .fixed-icon { color: var(--success); }

  /* ── GROUP BOX ── */
  .group-box { background: white; border-radius: 12px; border: 1px solid var(--gray-200); padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .group-header { display: flex; align-items: center; gap-8px; justify-content: space-between; margin-bottom: 12px; }
  .group-title { font-size: 0.88rem; font-weight: 600; color: var(--gray-700); display: flex; align-items: center; gap: 6px; }
  .group-meta { font-size: 0.75rem; color: var(--gray-500); }
  .group-note { font-size: 0.75rem; color: var(--warning); background: var(--warning-light); padding: 6px 10px; border-radius: 6px; margin-bottom: 10px; border-left: 3px solid var(--warning); }
  .group-count { font-size: 0.72rem; padding: 2px 8px; border-radius: 99px; }
  .group-count.ok { background: var(--success-light); color: var(--success); }
  .group-count.over { background: var(--danger-light); color: var(--danger); }
  .group-count.pending { background: var(--gray-100); color: var(--gray-500); }

  /* ── TOAST ── */
  .toast-container { position: fixed; top: 70px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast { background: var(--gray-800); color: white; padding: 10px 16px; border-radius: 8px; font-size: 0.82rem; box-shadow: 0 4px 12px rgba(0,0,0,.2); animation: slideIn .2s ease; max-width: 280px; pointer-events: auto; }
  .toast.success { background: var(--success); }
  .toast.warning { background: var(--warning); }
  .toast.error { background: var(--danger); }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: white; border-radius: 16px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .modal-header { padding: 20px 20px 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .modal-title { font-size: 1.05rem; font-weight: 700; color: var(--gray-800); }
  .modal-subtitle { font-size: 0.78rem; color: var(--primary); margin-top: 3px; }
  .modal-close { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--gray-100); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; }
  .modal-close:hover { background: var(--gray-200); }
  .modal-body { padding: 16px 20px 20px; }
  .modal-intro { font-size: 0.83rem; color: var(--gray-600); line-height: 1.6; margin-bottom: 14px; background: var(--gray-50); border-radius: 8px; padding: 12px; }
  .modal-info-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .modal-info-chip { background: var(--primary-light); color: var(--primary); padding: 4px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 500; }
  .modal-section-title { font-size: 0.78rem; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
  .modal-content-row { margin-bottom: 10px; }
  .modal-content-label { font-size: 0.75rem; color: var(--gray-500); margin-bottom: 3px; }
  .modal-content-text { font-size: 0.83rem; color: var(--gray-700); line-height: 1.5; }

  /* ── CAREER TAB ── */
  .career-layout { display: grid; grid-template-columns: 220px 1fr; gap: 16px; }
  @media (max-width: 700px) { .career-layout { grid-template-columns: 1fr; } }
  .career-sidebar { background: white; border-radius: 12px; border: 1px solid var(--gray-200); overflow: hidden; height: fit-content; position: sticky; top: 76px; }
  .career-sidebar-section { border-bottom: 1px solid var(--gray-100); }
  .career-division-label { font-size: 0.7rem; font-weight: 600; color: var(--gray-400); padding: 10px 14px 6px; text-transform: uppercase; letter-spacing: .06em; }
  .career-track-btn { display: block; width: 100%; text-align: left; padding: 8px 14px; border: none; background: none; cursor: pointer; font-size: 0.82rem; color: var(--gray-600); transition: all .12s; border-left: 3px solid transparent; }
  .career-track-btn:hover { background: var(--gray-50); color: var(--gray-800); }
  .career-track-btn.active { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
  .career-main { min-height: 400px; }
  .career-track-header { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--gray-200); }
  .career-track-name { font-size: 1.2rem; font-weight: 700; color: var(--gray-800); margin-bottom: 6px; }
  .career-track-desc { font-size: 0.85rem; color: var(--gray-500); }
  .dept-list { display: flex; flex-direction: column; gap: 12px; }
  .dept-card { background: white; border-radius: 10px; border: 1px solid var(--gray-200); overflow: hidden; }
  .dept-card-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .dept-card-header:hover { background: var(--gray-50); }
  .dept-name { font-size: 0.92rem; font-weight: 600; color: var(--gray-800); }
  .dept-body { padding: 0 16px 16px; display: none; }
  .dept-body.open { display: block; }
  .dept-intro { font-size: 0.82rem; color: var(--gray-600); line-height: 1.6; margin-bottom: 10px; background: var(--gray-50); padding: 10px; border-radius: 8px; }
  .dept-careers-label { font-size: 0.72rem; font-weight: 600; color: var(--gray-500); margin-bottom: 5px; }
  .dept-careers-text { font-size: 0.8rem; color: var(--gray-600); line-height: 1.5; margin-bottom: 12px; }
  .rec-subjects-label { font-size: 0.72rem; font-weight: 600; color: var(--gray-500); margin-bottom: 6px; }
  .rec-subjects-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
  .rec-chip { padding: 3px 9px; border-radius: 99px; font-size: 0.73rem; background: var(--primary-light); color: var(--primary); border: 1px solid #C7D2FE; }
  .rec-chip.matched { background: #ECFDF5; color: var(--success); border-color: #A7F3D0; font-weight: 600; }

  /* ── SELECTED SUMMARY ── */
  .selected-list { background: white; border-radius: 12px; border: 1px solid var(--gray-200); padding: 16px; margin-top: 20px; }
  .selected-list-title { font-size: 0.88rem; font-weight: 600; color: var(--gray-700); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .selected-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .selected-chip { display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--primary-light); color: var(--primary); border-radius: 99px; font-size: 0.78rem; border: 1px solid #C7D2FE; }
  .selected-chip-del { cursor: pointer; color: #818CF8; font-size: 1rem; line-height: 1; }
  .selected-chip-del:hover { color: var(--danger); }
  .empty-msg { font-size: 0.82rem; color: var(--gray-400); font-style: italic; }

  /* category badge colors */
  .cat-국어 { background: #FFF1F2; color: #BE123C; border-color: #FECDD3; }
  .cat-수학 { background: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
  .cat-영어 { background: #EEF2FF; color: #4338CA; border-color: #C7D2FE; }
  .cat-사회 { background: #FFF7ED; color: #C2410C; border-color: #FED7AA; }
  .cat-과학 { background: #ECFDF5; color: #065F46; border-color: #A7F3D0; }
  .cat-체육 { background: #FFF1F2; color: #9F1239; border-color: #FECDD3; }
  .cat-예술 { background: #FDF4FF; color: #86198F; border-color: #F0ABFC; }
  .cat-교양 { background: #FFFBEB; color: #92400E; border-color: #FDE68A; }
  .cat-생활교양 { background: #F0FDFA; color: #0F766E; border-color: #99F6E4; }
  .cat-외국어 { background: #F5F3FF; color: #5B21B6; border-color: #DDD6FE; }

  /* reset btn */
  .reset-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--gray-200); background: white; font-size: 0.78rem; color: var(--gray-500); cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .reset-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* section title */
  .section-title { font-size: 0.78rem; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .section-title::after { content:''; flex:1; height:1px; background: var(--gray-200); }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .subject-grid { grid-template-columns: 1fr; }
    .credit-bar-row { gap: 10px; }
    .divider-v { display: none; }
    .header-title span { display: none; }
  }

  /* ── REC SUBJECT SEMESTER GROUPS ── */
  .rec-sem-group { margin-bottom: 10px; }
  .rec-sem-label { font-size: .7rem; font-weight: 600; color: var(--primary); background: var(--primary-light); display: inline-block; padding: 2px 8px; border-radius: 4px; margin-bottom: 5px; }

  /* ── 교과군별 rec-cat-badge 색상 ── */
  .rec-cat-badge { font-size: .62rem; border-radius: 3px; padding: 1px 4px; margin-right: 3px; font-weight: 600; }
  .rec-cat-국어  { background: #FFF1F2; color: #BE123C; }
  .rec-cat-수학  { background: #EFF6FF; color: #1D4ED8; }
  .rec-cat-영어  { background: #EEF2FF; color: #4338CA; }
  .rec-cat-사회  { background: #FFF7ED; color: #C2410C; }
  .rec-cat-과학  { background: #ECFDF5; color: #065F46; }
  .rec-cat-체육  { background: #FFF1F2; color: #9F1239; }
  .rec-cat-예술  { background: #FDF4FF; color: #86198F; }
  .rec-cat-교양  { background: #FFFBEB; color: #92400E; }
  .rec-cat-생활교양 { background: #F0FDFA; color: #0F766E; }
  .rec-cat-외국어 { background: #F5F3FF; color: #5B21B6; }
</style>
</head>

let currentYear = "2025";
let activeGrade = 2;
let activeSemester = 1;
let selectedChoices = []; // {id, name, category, credits, groupId, warningRule, blockRule}
let selectedTrackId = "humanities_lang";
let selectedDeptOpen = null;

// ─── UTILS ──────────────────────────────────────────────
function showToast(msg, type = "default", duration = 2500) {
  const c = document.getElementById("toastContainer");
  const t = document.createElement("div");
  t.className = "toast " + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

function catClass(cat) {
  const map = {"국어":"cat-국어","수학":"cat-수학","영어":"cat-영어","사회":"cat-사회","과학":"cat-과학","체육":"cat-체육","예술":"cat-예술","교양":"cat-교양","생활교양":"cat-생활교양","외국어":"cat-외국어"};
  return map[cat] || "cat-교양";
}

// ─── CREDITS ────────────────────────────────────────────
function recalcCredits() {
  const cur = CURRICULUM_DATA[currentYear];
  const fixedC = cur.fixed.reduce((s, x) => s + x.credits, 0);
  const choiceC = selectedChoices.reduce((s, x) => s + x.credits, 0);
  const total = fixedC + choiceC;
  const pct = Math.min(100, Math.round(choiceC / (cur.courseworkRequired - fixedC) * 100));

  document.getElementById("totalCredits").textContent = total;
  document.getElementById("fixedCredits").textContent = fixedC;
  document.getElementById("choiceCredits").textContent = choiceC;
  document.getElementById("progressPct").textContent = Math.min(100, Math.round(total / cur.courseworkRequired * 100)) + "%";

  const fill = document.getElementById("progressFill");
  const fillPct = Math.min(100, Math.round(total / cur.courseworkRequired * 100));
  fill.style.width = fillPct + "%";
  fill.className = "progress-fill" + (total >= cur.courseworkRequired ? " done" : "");

  renderSelectedChips();
  if (document.getElementById("pane-career").style.display !== "none") renderCareerMain();
}

// ─── GRADE TABS ─────────────────────────────────────────
function buildGradeTabs() {
  const cur = CURRICULUM_DATA[currentYear];
  const grades = [...new Set([...cur.fixed.map(x => x.grade), ...cur.choiceGroups.map(x => x.grade)])].sort();
  const container = document.getElementById("gradeTabs");
  container.innerHTML = "";
  grades.forEach(g => {
    const btn = document.createElement("button");
    btn.className = "grade-tab" + (g === activeGrade ? " active" : "");
    btn.textContent = g + "학년";
    btn.onclick = () => { activeGrade = g; activeSemester = 1; buildGradeTabs(); renderPlanner(); };
    container.appendChild(btn);
  });
  // sem buttons
  document.getElementById("sem1btn").className = "sem-tab" + (activeSemester === 1 ? " active" : "");
  document.getElementById("sem2btn").className = "sem-tab" + (activeSemester === 2 ? " active" : "");
}

function setSemester(s) {
  activeSemester = s;
  document.getElementById("sem1btn").className = "sem-tab" + (s === 1 ? " active" : "");
  document.getElementById("sem2btn").className = "sem-tab" + (s === 2 ? " active" : "");
  renderPlanner();
}

// ─── PLANNER RENDER ─────────────────────────────────────
function renderPlanner() {
  renderFixed();
  renderChoiceGroups();
}

function renderFixed() {
  const cur = CURRICULUM_DATA[currentYear];
  const subjects = cur.fixed.filter(x => x.grade === activeGrade && x.semester === activeSemester);
  const grid = document.getElementById("fixedGrid");
  grid.innerHTML = "";
  subjects.forEach(subj => {
    grid.appendChild(makeFixedCard(subj));
  });
  if (!subjects.length) {
    grid.innerHTML = '<div style="color:var(--gray-400);font-size:.83rem;padding:8px 0;">이 학기에 지정된 필수 교과가 없습니다.</div>';
  }
}

function makeFixedCard(subj) {
  const div = document.createElement("div");
  div.className = "subject-card fixed";
  div.innerHTML = `
    <div class="card-top">
      <div class="subject-name fixed-name">${subj.name}</div>
      <span class="fixed-icon" title="필수 교과">✓</span>
    </div>
    <div class="card-badges">
      <span class="badge badge-category ${catClass(subj.category)}">${subj.category}</span>
      <span class="badge badge-credits">${subj.credits}학점</span>
      <span class="badge badge-fixed">필수</span>
      ${subj.isSpecialty ? '<span class="badge badge-specialty">전문교과</span>' : ''}
    </div>
  `;
  if (SUBJECT_DETAILS[subj.name]) {
    const infoBtn = document.createElement("button");
    infoBtn.className = "info-btn";
    infoBtn.title = "과목 상세";
    infoBtn.innerHTML = "ℹ";
    infoBtn.onclick = (e) => { e.stopPropagation(); showSubjectDetail(subj.name); };
    div.querySelector(".card-top").appendChild(infoBtn);
  }
  return div;
}

function renderChoiceGroups() {
  const cur = CURRICULUM_DATA[currentYear];
  const groups = cur.choiceGroups.filter(g => g.grade === activeGrade && g.semester === activeSemester);
  const area = document.getElementById("choiceGroupsArea");
  area.innerHTML = "";

  if (!groups.length) return;

  groups.forEach(group => {
    const selectedInGroup = selectedChoices.filter(x => x.groupId === group.groupId);
    const selCount = selectedInGroup.length;
    const over = selCount > group.maxSelect;
    const ok = selCount === group.maxSelect;

    const box = document.createElement("div");
    box.className = "group-box";

    const countClass = over ? "over" : ok ? "ok" : "pending";
    const countLabel = over ? `${selCount}/${group.maxSelect} 초과` : ok ? `${selCount}/${group.maxSelect} 완료` : `${selCount}/${group.maxSelect}`;

    box.innerHTML = `
      <div class="group-header">
        <div class="group-title">📂 ${group.groupName}</div>
        <span class="group-count ${countClass} badge">${countLabel}</span>
      </div>
      ${group.note ? `<div class="group-note">⚠️ ${group.note}</div>` : ''}
    `;

    const grid = document.createElement("div");
    grid.className = "subject-grid";
    grid.style.marginBottom = "0";

    group.subjects.forEach(subj => {
      grid.appendChild(makeChoiceCard(subj, group, selectedInGroup));
    });

    box.appendChild(grid);
    area.appendChild(box);

    const secDiv = document.createElement("div");
    area.insertBefore(document.createElement("div"), box);
  });
}

function makeChoiceCard(subj, group, selectedInGroup) {
  const isSelected = selectedChoices.some(x => x.id === subj.id);
  const selCount = selectedInGroup.length;
  const over = selCount > group.maxSelect;

  // blockRule: 2학년 1학기 restricted 선택시 제한
  const hasRestricted = selectedChoices.some(x => x.warningRule === "max_one_restricted");
  const isBlocked = subj.blockRule && hasRestricted && !isSelected;
  const isDisabled = !isSelected && (selCount >= group.maxSelect || isBlocked);

  const div = document.createElement("div");
  div.className = "subject-card" + (isSelected ? " selected" : "") + (isDisabled && !isSelected ? " disabled" : "");

  div.innerHTML = `
    <div class="card-top">
      <div class="subject-name">${subj.name}</div>
    </div>
    <div class="card-badges">
      <span class="badge badge-category ${catClass(subj.category)}">${subj.category}</span>
      <span class="badge badge-credits">${subj.credits}학점</span>
      ${subj.isSpecialty ? '<span class="badge badge-specialty">전문교과</span>' : ''}
      ${subj.warningRule === "max_one_restricted" ? '<span class="badge" style="background:#FFF7ED;color:#C2410C;border-color:#FED7AA;">제한과목</span>' : ''}
      ${subj.blockRule && hasRestricted ? '<span class="badge" style="background:#FEF2F2;color:#991B1B;border-color:#FECACA;">연계제한</span>' : ''}
    </div>
    <div class="card-bottom">
      <button class="check-btn ${isSelected ? 'checked' : ''}" onclick="toggleChoice(event, '${subj.id}', '${group.groupId}', '${group.maxSelect}')">
        ${isSelected ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
      </button>
    </div>
  `;

  if (SUBJECT_DETAILS[subj.name]) {
    const infoBtn = document.createElement("button");
    infoBtn.className = "info-btn";
    infoBtn.title = "과목 상세";
    infoBtn.innerHTML = "ℹ";
    infoBtn.onclick = (e) => { e.stopPropagation(); showSubjectDetail(subj.name); };
    div.querySelector(".card-top").appendChild(infoBtn);
  }

  return div;
}

function toggleChoice(e, subjId, groupId, maxSelect) {
  e.stopPropagation();
  const cur = CURRICULUM_DATA[currentYear];
  // find subj in all choiceGroups
  let subj = null;
  let group = null;
  for (const g of cur.choiceGroups) {
    const found = g.subjects.find(s => s.id === subjId);
    if (found) { subj = found; group = g; break; }
  }
  if (!subj) return;

  const idx = selectedChoices.findIndex(x => x.id === subjId);
  if (idx !== -1) {
    // 선택 해제
    selectedChoices.splice(idx, 1);
    showToast(`"${subj.name}" 선택 해제`, "default");
  } else {
    // 선택 추가
    const inGroup = selectedChoices.filter(x => x.groupId === groupId);
    if (inGroup.length >= parseInt(maxSelect)) {
      showToast(`이 선택군에서 최대 ${maxSelect}개까지 선택 가능합니다.`, "warning");
      return;
    }
    // restricted 중복 체크
    if (subj.warningRule === "max_one_restricted") {
      const alreadyRestricted = selectedChoices.some(x => x.warningRule === "max_one_restricted");
      if (alreadyRestricted) {
        showToast("제한 과목은 1개만 선택할 수 있습니다.", "error");
        return;
      }
    }
    // blockRule 체크: 2-1 제한과목 선택 시 → 3-2 A군 blockRule 과목 차단
    if (subj.blockRule) {
      const hasRestricted2_1 = selectedChoices.some(x => x.warningRule === "max_one_restricted");
      if (hasRestricted2_1) {
        showToast(`"${subj.name}"은(는) 2학년 1학기 제한과목 선택으로 인해 선택할 수 없습니다.`, "error");
        return;
      }
    }
    // 2-1 제한과목을 새로 선택할 때: 이미 blockRule 과목이 선택돼 있으면 경고 후 제거
    if (subj.warningRule === "max_one_restricted") {
      const blockedSelected = selectedChoices.filter(x => x.blockRule);
      if (blockedSelected.length > 0) {
        blockedSelected.forEach(bs => {
          const bIdx = selectedChoices.findIndex(x => x.id === bs.id);
          if (bIdx !== -1) selectedChoices.splice(bIdx, 1);
        });
        showToast(`주의: 이미 선택한 [${blockedSelected.map(x=>x.name).join(', ')}] 과목이 연계 제한으로 자동 해제되었습니다.`, "warning", 4000);
      }
    }
    selectedChoices.push({ ...subj, groupId });
    showToast(`"${subj.name}" 선택 완료 (${subj.credits}학점)`, "success");
  }
  recalcCredits();
  renderPlanner();
}

function renderSelectedChips() {
  const container = document.getElementById("selectedChips");
  const count = document.getElementById("choiceCount");
  container.innerHTML = "";
  if (!selectedChoices.length) {
    container.innerHTML = '<span class="empty-msg">선택한 과목이 없습니다.</span>';
    count.textContent = "";
    return;
  }
  count.textContent = `(${selectedChoices.length}과목 / ${selectedChoices.reduce((s,x)=>s+x.credits,0)}학점)`;
  selectedChoices.forEach(subj => {
    const chip = document.createElement("div");
    chip.className = "selected-chip";
    chip.innerHTML = `<span>${subj.name}</span><span class="badge badge-credits" style="border:none;font-size:.68rem;">${subj.credits}점</span><span class="selected-chip-del" onclick="removeChoice('${subj.id}')">×</span>`;
    container.appendChild(chip);
  });
}

function removeChoice(subjId) {
  const idx = selectedChoices.findIndex(x => x.id === subjId);
  if (idx !== -1) {
    const name = selectedChoices[idx].name;
    selectedChoices.splice(idx, 1);
    showToast(`"${name}" 선택 해제`, "default");
    recalcCredits();
    renderPlanner();
  }
}

function resetChoices() {
  if (!selectedChoices.length) return;
  selectedChoices = [];
  showToast("선택 과목 초기화 완료", "default");
  recalcCredits();
  renderPlanner();
}

};
const SEM_ORDER = {"1-1":0,"1-2":1,"2-1":2,"2-2":3,"3-1":4,"3-2":5,"?":99};
const CAT_ORDER = {"국어":0,"수학":1,"영어":2,"사회":3,"과학":4,"체육":5,"예술":6,"교양":7,"생활교양":8,"외국어":9};

// ─── CAREER RENDER ──────────────────────────────────────
function renderCareerSidebar() {
  const sidebar = document.getElementById("careerSidebar");
  sidebar.innerHTML = "";

  const divisions = [...new Set(ACADEMIC_TRACKS.map(t => t.division))];
  divisions.forEach(div => {
    const tracks = ACADEMIC_TRACKS.filter(t => t.division === div);
    const section = document.createElement("div");
    section.className = "career-sidebar-section";
    section.innerHTML = `<div class="career-division-label">${div}</div>`;
    tracks.forEach(track => {
      const btn = document.createElement("button");
      btn.className = "career-track-btn" + (track.id === selectedTrackId ? " active" : "");
      btn.textContent = track.name;
      btn.onclick = () => { selectedTrackId = track.id; selectedDeptOpen = null; renderCareerSidebar(); renderCareerMain(); };
      section.appendChild(btn);
    });
    sidebar.appendChild(section);
  });
}

function renderCareerMain() {
  const track = ACADEMIC_TRACKS.find(t => t.id === selectedTrackId);
  if (!track) return;
  const main = document.getElementById("careerMain");

  main.innerHTML = `
    <div class="career-track-header">
      <div class="career-track-name">${track.name}</div>
      <div class="career-track-desc">${track.description}</div>
    </div>
  `;

  const mySubjectNames = selectedChoices.map(x => x.name);

  const deptList = document.createElement("div");
  deptList.className = "dept-list";

  track.departments.forEach(dept => {
    const card = document.createElement("div");
    card.className = "dept-card";

    const matchCount = dept.recommended.filter(r => mySubjectNames.includes(r.name)).length;
    const matchLabel = matchCount > 0 ? ` <span style="color:var(--success);font-size:.75rem;">✓ ${matchCount}과목 매칭</span>` : "";

    const header = document.createElement("div");
    header.className = "dept-card-header";
    const isOpen = selectedDeptOpen === dept.id;
    header.innerHTML = `<div class="dept-name">${dept.name}${matchLabel}</div><span>${isOpen ? "▲" : "▼"}</span>`;
    header.onclick = () => {
      selectedDeptOpen = selectedDeptOpen === dept.id ? null : dept.id;
      renderCareerMain();
    };

    const body = document.createElement("div");
    body.className = "dept-body" + (isOpen ? " open" : "");

    // 편제표 순서로 정렬
    const sortedRec = [...dept.recommended].sort((a, b) => {
      const infoA = SUBJECT_ORDER[a.name] || {sem:"?",cat:"?"};
      const infoB = SUBJECT_ORDER[b.name] || {sem:"?",cat:"?"};
      const semA = SEM_ORDER[infoA.sem] ?? 99;
      const semB = SEM_ORDER[infoB.sem] ?? 99;
      const catA = CAT_ORDER[infoA.cat] ?? 99;
      const catB = CAT_ORDER[infoB.cat] ?? 99;
      if (semA !== semB) return semA - semB;
      if (catA !== catB) return catA - catB;
      return a.name.localeCompare(b.name, 'ko');
    });

    // 학기별 그룹핑
    const semGroups = {};
    const semLabels = {"1-1":"1학년 1학기","1-2":"1학년 2학기","2-1":"2학년 1학기","2-2":"2학년 2학기","3-1":"3학년 1학기","3-2":"3학년 2학기","?":"기타"};
    sortedRec.forEach(r => {
      const info = SUBJECT_ORDER[r.name] || {sem:"?",cat:"?"};
      const sem = info.sem;
      if (!semGroups[sem]) semGroups[sem] = [];
      semGroups[sem].push({name: r.name, cat: info.cat});
    });

    let recHtml = '';
    const semKeyOrder = ["1-1","1-2","2-1","2-2","3-1","3-2","?"];
    semKeyOrder.forEach(sem => {
      if (!semGroups[sem]) return;
      recHtml += `<div class="rec-sem-group"><div class="rec-sem-label">${semLabels[sem]}</div><div class="rec-subjects-wrap">`;
      semGroups[sem].forEach(({name, cat}) => {
        const matched = mySubjectNames.includes(name);
        recHtml += `<span class="rec-chip${matched ? " matched" : ""}"><span class="rec-cat-badge rec-cat-${cat}">${cat}</span>${name}${matched ? " ✓" : ""}</span>`;
      });
      recHtml += `</div></div>`;
    });

    body.innerHTML = `
      <div class="dept-intro">${dept.intro}</div>
      <div class="dept-careers-label">💼 진출 분야</div>
      <div class="dept-careers-text">${dept.careers}</div>
      <div class="rec-subjects-label">📌 추천 과목 <span style="font-size:.7rem;color:var(--gray-400);font-weight:400;">(편제표 순 · 교과군 표시)</span></div>
      ${recHtml}
    `;

    card.appendChild(header);
    card.appendChild(body);
    deptList.appendChild(card);
  });

  main.appendChild(deptList);
}

// ─── TAB SWITCH ─────────────────────────────────────────
function switchTab(tab) {
  document.getElementById("pane-planner").style.display = tab === "planner" ? "" : "none";
  document.getElementById("pane-career").style.display = tab === "career" ? "" : "none";
  document.getElementById("tab-planner").className = "tab-btn" + (tab === "planner" ? " active" : "");
  document.getElementById("tab-career").className = "tab-btn" + (tab === "career" ? " active" : "");
  if (tab === "career") { renderCareerSidebar(); renderCareerMain(); }
}

function changeYear(y) {
  currentYear = y;
  selectedChoices = [];
  activeGrade = 2;
  activeSemester = 1;
  buildGradeTabs();
  renderPlanner();
  recalcCredits();
  showToast(`${y}학년도로 전환했습니다.`, "default");
}

// ─── INIT ────────────────────────────────────────────────
window.onload = () => {
  buildGradeTabs();
  renderPlanner();
  recalcCredits();
};
</script>
</body>
</html>
